<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toram Formula Auto Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; font-size: 13px; background: #f0f2f5; color: #222; }
h1 { font-size: 15px; padding: 10px 16px; background: #1a3a5c; color: #fff; }
.wrap { display: flex; gap: 14px; padding: 14px; max-width: 1100px; }
.panel { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 12px; }
.inputs { width: 330px; flex-shrink: 0; }
.results { flex: 1; min-width: 0; }

.sec { font-weight: bold; color: #1a3a5c; border-bottom: 1px solid #ddd;
       padding-bottom: 3px; margin: 10px 0 7px; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
.sec:first-child { margin-top: 0; }

.row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.row label { width: 120px; flex-shrink: 0; color: #555; font-size: 12px; }
.row input[type=number], .row select { flex: 1; padding: 3px 5px; border: 1px solid #bbb;
  border-radius: 3px; font-family: monospace; font-size: 12px; }

.info { font-size: 11px; color: #666; background: #f5f7fa; border: 1px solid #dde;
        padding: 4px 7px; border-radius: 3px; margin-bottom: 6px; }

table.slots { width: 100%; border-collapse: collapse; margin-bottom: 5px; }
table.slots th { background: #edf2f7; padding: 2px 5px; border: 1px solid #ccc; font-size: 11px; }
table.slots td { padding: 2px 3px; border: 1px solid #ddd; }
table.slots td select { width: 100%; font-size: 11px; border: none; background: transparent; }
/* val control */
.val-ctrl { display: flex; align-items: center; gap: 2px; }
.val-btn {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 22px; padding: 0 4px;
  background: #dbe8f5; border: 1px solid #aac; border-radius: 3px;
  cursor: pointer; font-size: 12px; font-weight: bold; user-select: none; flex-shrink: 0;
  color: #1a3a5c;
}
.val-btn:hover { background: #b8d4ee; }
.val-btn:active { background: #9ac0e8; }
.val-display {
  width: 46px; text-align: center; border: 1px solid #ccc;
  font-family: monospace; font-size: 12px; padding: 2px 3px;
  border-radius: 2px; background: #fafafa; color: #222;
}
.val-display.is-neg { color: #aa2222; }
table.slots tr.neg-row td { background: #fff5f5; }

button.add-btn { font-size: 11px; padding: 2px 8px; cursor: pointer; margin-bottom: 6px; }
button#gen { width: 100%; padding: 8px; background: #1a3a5c; color: #fff; border: none;
             border-radius: 3px; cursor: pointer; font-size: 13px; font-weight: bold; margin-top: 8px; }
button#gen:hover { background: #265080; }

/* Results */
.r-block { border: 1px solid #bbb; border-radius: 4px; padding: 9px 10px; margin-bottom: 8px; }
.r-block.r100  { border-color: #2a7a2a; background: #f0faf0; }
.r-block.r90   { border-color: #7a6a00; background: #fdfaf0; }
.r-block.r70   { border-color: #8a5000; background: #fdf8f0; }
.r-block.rlow  { border-color: #9a2a00; background: #fdf5f0; }
.r-block.rzero { border-color: #888;    background: #f7f7f7; }

.r-head { font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
.badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
.badge.b100  { background: #d4edda; color: #155724; }
.badge.b90   { background: #fff3cd; color: #856404; }
.badge.b70   { background: #ffe5cc; color: #6d3a00; }
.badge.blow  { background: #f8d7da; color: #721c24; }
.badge.bzero { background: #e8e8e8; color: #555; }

.step-row { padding: 2px 0; border-bottom: 1px solid #eee; display: flex; gap: 6px; font-size: 12px; }
.step-row:last-child { border-bottom: none; }
.snum { color: #999; width: 58px; flex-shrink: 0; }
.sbody { flex: 1; }
.pos { color: #1a6a1a; }
.neg { color: #aa2222; }
.srep { color: #888; font-size: 11px; }
.mat-row { font-size: 11px; color: #666; margin-top: 5px; padding-top: 4px; border-top: 1px dashed #ddd; }
.sum-row { font-size: 11px; color: #444; margin-top: 3px; }
.err { color: #c00; font-size: 12px; padding: 6px; }
.hint { font-size: 11px; color: #999; margin: 2px 0 5px; }
.level-required { border-color: #c00 !important; background: #fff0f0 !important; }
</style>
</head>
<body>
<h1>Toram Online — Formula Auto Generator</h1>
<div class="wrap">

<!-- ── INPUTS ─────────────────────────────────────────────── -->
<div class="panel inputs">

  <div class="sec">Character</div>
  <div class="row"><label>Base Level</label>
    <input type="number" id="baselevel" value="315" min="10" max="400" oninput="updateAllRanges()"></div>
  <div class="row"><label>Smith Proficiency</label>
    <input type="number" id="smithprof" value="0" min="0" max="300"></div>
  <div class="row"><label>VIT (armor bonus)</label>
    <input type="number" id="vit" value="0" min="0" max="510" oninput="onVitChange()"></div>

  <div class="sec">Equipment</div>
  <div class="row"><label>Type</label>
    <select id="equip-type" onchange="onTypeChange()">
      <option value="W">Weapon</option>
      <option value="A" selected>Armor</option>
    </select>
  </div>
  <div class="row"><label>Match Element</label>
    <select id="match-element">
      <option value="0">No</option>
      <option value="1">Yes</option>
    </select>
  </div>

  <!-- Garb selection (armor only) -->
  <div id="garb-row" class="row">
    <label>Garb</label>
    <select id="garb-select" onchange="onGarbChange()">
      <option value="">— manual —</option>
    </select>
  </div>

  <div class="row"><label>Base Potential</label>
    <input type="number" id="base-pot" value="59" min="0" max="999" oninput="onPotChange()"></div>
  <div class="info" id="pot-info">Effective potential: 59</div>

  <div class="sec">Positive Stats (target)</div>
  <div class="hint">Slots used by pos + neg combined ≤ 8</div>
  <table class="slots"><thead><tr><th>#</th><th>Stat</th><th>Value</th><th></th></tr></thead>
    <tbody id="pos-body"></tbody></table>
  <button class="add-btn" onclick="addPos()">+ Add Stat</button>

  <div class="sec">Negative Stats (potential return)</div>
  <table class="slots"><thead><tr><th>#</th><th>Stat</th><th>Value</th><th></th></tr></thead>
    <tbody id="neg-body"></tbody></table>
  <button class="add-btn" onclick="addNeg()">+ Add Neg Stat</button>

  <button id="gen" onclick="generate()">Generate Formula</button>
</div>

<!-- ── RESULTS ────────────────────────────────────────────── -->
<div class="panel results">
  <div class="sec">Results — All Success Rates</div>
  <div id="result-area"><div style="color:#999;font-size:12px">Configure inputs and click Generate.</div></div>
</div>

</div>

<script src="js/formula_generator.js"></script>
<script>
// ─── STAT OPTION HTML ─────────────────────────────────────────────────────────

const STAT_OPTS = '<option value="0">— none —</option>' +
  Object.values(STATS).map(s => `<option value="${s.id}">${s.name}</option>`).join('');

// ─── GARB DROPDOWN INIT ───────────────────────────────────────────────────────

(function initGarbs() {
  const sel = document.getElementById('garb-select');
  GARBS.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.pot;
    opt.textContent = `${g.name} (pot ${g.pot})`;
    sel.appendChild(opt);
  });
})();

// ─── UI HELPERS ───────────────────────────────────────────────────────────────

function vitBonus() {
  const vit  = +document.getElementById('vit').value || 0;
  const type = document.getElementById('equip-type').value;
  return type === 'A' ? Math.floor(vit / 10) : 0;
}

function effectivePot() {
  return (+document.getElementById('base-pot').value || 0) + vitBonus();
}

function updatePotInfo() {
  const base  = +document.getElementById('base-pot').value || 0;
  const bonus = vitBonus();
  const vit   = +document.getElementById('vit').value || 0;
  document.getElementById('pot-info').textContent =
    `Effective potential: ${base + bonus}  (base ${base} + VIT ${vit}÷10 = +${bonus}, armor only)`;
}

function onTypeChange() {
  document.getElementById('garb-row').style.display =
    document.getElementById('equip-type').value === 'A' ? 'flex' : 'none';
  updatePotInfo();
}

function onGarbChange() {
  const v = document.getElementById('garb-select').value;
  if (v) document.getElementById('base-pot').value = v;
  updatePotInfo();
}

function onVitChange() { updatePotInfo(); }
function onPotChange() {
  document.getElementById('garb-select').value = ''; // deselect garb when manual
  updatePotInfo();
}

// ─── SLOT MANAGEMENT ──────────────────────────────────────────────────────────

function makeRow(idx, isNeg, statId, val) {
  const tr = document.createElement('tr');
  if (isNeg) tr.className = 'neg-row';
  tr.innerHTML = `
    <td style="${isNeg ? 'color:#c00' : ''}">${idx}</td>
    <td><select onchange="onStatChange(this.closest('tr'))">${STAT_OPTS}</select></td>
    <td>
      <div class="val-ctrl">
        <span class="val-btn" onclick="jumpVal(this.closest('tr'),-1)" title="Min">|−</span>
        <span class="val-btn" onclick="stepVal(this.closest('tr'),-1)" title="Step −">−</span>
        <input class="val-display" type="text" value="${val || 0}" readonly
               onblur="snapRowVal(this.closest('tr'))">
        <span class="val-btn" onclick="stepVal(this.closest('tr'),1)" title="Step +">+</span>
        <span class="val-btn" onclick="jumpVal(this.closest('tr'),1)" title="Max">+|</span>
      </div>
    </td>
    <td><button onclick="this.closest('tr').remove()"
                style="cursor:pointer;font-size:11px;padding:2px 7px">✕</button></td>`;
  if (statId) tr.querySelector('select').value = statId;
  return tr;
}

function addPos(statId, val = 0) {
  const tbody = document.getElementById('pos-body');
  tbody.appendChild(makeRow(tbody.children.length + 1, false, statId, val));
}

function addNeg(statId, val = 0) {
  const tbody = document.getElementById('neg-body');
  tbody.appendChild(makeRow(tbody.children.length + 1, true, statId, val));
}

function getLevel() { return +document.getElementById('baselevel').value || 1; }

function setDisp(disp, val) {
  disp.value = val;
  disp.className = 'val-display' + (val < 0 ? ' is-neg' : '');
}

function stepVal(row, dir) {
  const statId = +row.querySelector('select').value;
  if (!statId) return;
  const level = getLevel();
  const s = STATS[statId];
  const disp = row.querySelector('.val-display');
  const cur = +disp.value || 0;
  if (cur === 0 && dir < 0 && !s.negative_ok) return;
  const ctr = valToCounter(cur, statId);
  const newCtr = ctr + dir;
  const maxCtr = getMinMaxSteps(statId,  1, level);
  const minCtr = getMinMaxSteps(statId, -1, level);
  if (newCtr > maxCtr || newCtr < minCtr) return;
  setDisp(disp, counterToVal(newCtr, statId));
}

function jumpVal(row, dir) {
  const statId = +row.querySelector('select').value;
  if (!statId) return;
  const level = getLevel();
  const s = STATS[statId];
  if (dir < 0 && !s.negative_ok) return;
  const ctr = getMinMaxSteps(statId, dir, level);
  setDisp(row.querySelector('.val-display'), counterToVal(ctr, statId));
}

function snapRowVal(row) {
  const statId = +row.querySelector('select').value;
  if (!statId) return;
  const disp = row.querySelector('.val-display');
  setDisp(disp, snapValue(+disp.value || 0, statId, getLevel()));
}

function onStatChange(row) {
  const disp = row.querySelector('.val-display');
  setDisp(disp, 0);
}

function updateAllRanges() {
  document.querySelectorAll('#pos-body tr, #neg-body tr').forEach(snapRowVal);
}

function readSlots(tbodyId) {
  const level = getLevel();
  return [...document.getElementById(tbodyId).querySelectorAll('tr')]
    .map(tr => {
      const id  = +tr.querySelector('select').value;
      const raw = +tr.querySelector('.val-display').value;
      return { id, targetVal: id ? snapValue(raw, id, level) : raw };
    })
    .filter(s => s.id && s.targetVal !== 0);
}

// ─── RENDER RESULT ────────────────────────────────────────────────────────────

function rateClass(r) {
  if (r === 100) return 'r100';
  if (r >= 90)   return 'r90';
  if (r >= 70)   return 'r70';
  if (r > 0)     return 'rlow';
  return 'rzero';
}
function badgeClass(r) {
  if (r === 100) return 'b100';
  if (r >= 90)   return 'b90';
  if (r >= 70)   return 'b70';
  if (r > 0)     return 'blow';
  return 'bzero';
}
function rateLabel(r) {
  if (r === 100) return '100% — Safe';
  if (r >= 90)   return `${r}% — Low Gamble`;
  if (r >= 70)   return `${r}% — Gamble`;
  if (r > 0)     return `${r}% — High Risk`;
  return '0% — Will Fail';
}

function renderResult(res, idx) {
  if (res.error) return `<div class="r-block"><div class="err">${res.error}</div></div>`;

  const rc = rateClass(res.rate);
  const bc = badgeClass(res.rate);

  let prevVals  = Array(8).fill(0);
  let stepsHtml = '';
  const totalMats = {};

  res.steps.forEach((step, si) => {
    const changes = [];
    for (let i = 0; i < 8; i++) {
      const id = step.slotStats[i];
      if (!id) continue;
      const d = step.vals[i] - (prevVals[i] || 0);
      if (d === 0) continue;
      const sign = d > 0 ? '+' : '';
      const cls  = d > 0 ? 'pos' : 'neg';
      changes.push(`<span class="${cls}">${STATS[id].name} ${sign}${d}</span>`);
    }
    Object.entries(step.mats || {}).forEach(([mid, amt]) => {
      totalMats[mid] = (totalMats[mid] || 0) + amt * step.repeat;
    });
    if (!changes.length) return;
    const rep = step.repeat > 1 ? `<span class="srep"> ×${step.repeat}</span>` : '';
    stepsHtml += `<div class="step-row">
      <span class="snum">STEP #${si + 1}</span>
      <span class="sbody">${changes.join(', ')}${rep}</span>
    </div>`;
    prevVals = [...step.vals];
  });

  const matsStr = Object.entries(totalMats)
    .map(([mid, amt]) => `${MATERIAL[mid]}: ${amt.toLocaleString()}`)
    .join(' | ') || 'None';

  return `<div class="r-block ${rc}">
    <div class="r-head">
      <span class="badge ${bc}">${rateLabel(res.rate)}</span>
      <span style="font-size:11px;color:#666">${res.totalConfirms} confirms · split N=${res.splitN} · pot left: ${res.potRemaining}</span>
    </div>
    ${stepsHtml}
    <div class="mat-row">Materials: ${matsStr}</div>
  </div>`;
}

// ─── GENERATE ─────────────────────────────────────────────────────────────────

function generate() {
  const level     = +document.getElementById('baselevel').value || 315;
  const smithProf = +document.getElementById('smithprof').value || 0;
  const equipType = document.getElementById('equip-type').value;
  const matchElem = document.getElementById('match-element').value;
  const startPot  = effectivePot();
  const basePot   = +document.getElementById('base-pot').value || 0;

  const positive = readSlots('pos-body');
  const negative = readSlots('neg-body');
  const area     = document.getElementById('result-area');

  if (!positive.length) {
    area.innerHTML = '<div class="err">Add at least one positive target stat.</div>';
    return;
  }

  // Level required
  if (!level || level < 10) {
    document.getElementById('baselevel').classList.add('level-required');
    area.innerHTML = '<div class="err">Base Level is required (min 10).</div>';
    return;
  }
  document.getElementById('baselevel').classList.remove('level-required');

  // Level cap check
  for (const p of positive) {
    const maxCtr = getMinMaxSteps(p.id, 1, level);
    if (Math.floor(valToCounter(p.targetVal, p.id)) > maxCtr) {
      area.innerHTML = `<div class="err">${STATS[p.id].name} +${p.targetVal} exceeds level cap at Lv${level}</div>`;
      return;
    }
  }
  for (const n of negative) {
    const minCtr = getMinMaxSteps(n.id, -1, level);
    if (Math.floor(valToCounter(n.targetVal, n.id)) < minCtr) {
      area.innerHTML = `<div class="err">${STATS[n.id].name} ${n.targetVal} exceeds negative level cap at Lv${level}</div>`;
      return;
    }
  }

  const results = generateFormula(positive, negative, equipType, startPot, basePot, smithProf, matchElem);

  if (!results.length) {
    area.innerHTML = '<div class="err">No valid formula found. Try adjusting stats or potential.</div>';
    return;
  }

  const vb  = vitBonus();
  const hdr = `<div style="font-size:11px;color:#666;margin-bottom:8px">
    ${equipType === 'A' ? 'Armor' : 'Weapon'} · Lv${level} · Smith ${smithProf} ·
    Starting Pot: ${startPot} (base ${basePot}${vb > 0 ? ` + VIT bonus ${vb}` : ''}) ·
    Match Element: ${matchElem === '1' ? 'Yes' : 'No'} ·
    ${results.length} rate tier${results.length > 1 ? 's' : ''} found
  </div>`;

  area.innerHTML = hdr + results.map(renderResult).join('');
}

// ─── INIT (prefill example) ───────────────────────────────────────────────────

(function prefill() {
  // Same example as the readme: Armor 59 pot
  // Positive: Critical Damage +20, Critical Rate +28, DEX% +10, % vs Dark +21
  [[43,20],[41,28],[12,10],[50,21]].forEach(([id,v]) => addPos(id, v));
  // Negative: Accuracy -22, Accuracy% -6, Magic Pierce% -8, MATK% -14
  [[33,-22],[34,-6],[26,-8],[23,-14]].forEach(([id,v]) => addNeg(id, v));

  // Select the matching garb (Anniversary Festive Garb, pot=38... no, use 59 manually)
  document.getElementById('equip-type').value = 'A';
  document.getElementById('base-pot').value   = 59;
  onTypeChange();
  updatePotInfo();
  updateAllRanges();
})();
</script>
</body>
</html>
